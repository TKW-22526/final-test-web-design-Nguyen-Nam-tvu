    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">TechStore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Quản lý</a></li>
                    <li class="nav-item"><a class="nav-link" href="html/gioi-thieu.html">Giới thiệu</a></li>

                    <li class="nav-item"><a class="nav-link" href="html/lien-he.html">Liên hệ</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <h2 class="text-center mb-4">Trang Quản Lý Sản Phẩm Công Nghệ</h2>
        
        <div class="bg-white p-3 rounded shadow-sm mb-4">
            <div class="row g-2 mb-3">
                <div class="col-md-4">
                    <input type="text" id="search-input" class="form-control" placeholder="Tìm kiếm tên..." oninput="searchProduct()">
                </div>
            </div>
            <hr>
            <div class="row g-2">
                <input type="hidden" id="form-id"> 
                <div class="col-md-3"><input type="text" id="form-name" class="form-control" placeholder="Tên sản phẩm"></div>
                <div class="col-md-3"><input type="number" id="form-price" class="form-control" placeholder="Giá tiền"></div>
                <div class="col-md-4"><input type="text" id="form-image" class="form-control" placeholder="Link ảnh URL"></div>
                <div class="col-md-2 d-grid">
                    <button id="btn-save" class="btn btn-primary" onclick="saveProduct()">Thêm</button>
                </div>
            </div>
        </div>

        <div class="row" id="product-list"></div>
    </div>

    <footer class="text-center">

    </footer>

        renderAdminGrid(productList);
